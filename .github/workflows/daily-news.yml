name: Daily News Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "20 6 * * *"  # 北京时间 14:20

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-news
  cancel-in-progress: true

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run AI-powered news radar
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/daily-news.js

      - name: Commit and push report
        run: |
          git config user.name "YUTATA Radar Bot"
          git config user.email "radar-bot@yutata.dev"
          git add docs/daily/
          git diff --cached --quiet || (
            git commit -m "📡 行业雷达日报 $(date +%Y-%m-%d)"
            git push
          )

      # 构建并部署 Pages
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist
      - uses: actions/deploy-pages@v4