name: Daily News Radar

on:
  schedule:
    - cron: "20 6 * * *"  # 北京时间 14:20  # 北京时间 12:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: true

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run AI-powered news radar
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/daily-news.js

      - name: Commit and push report
        run: |
          git config user.name "YUTATA Radar Bot"
          git config user.email "radar-bot@yutata.dev"
          git add docs/daily/
          git diff --cached --quiet || (
            git commit -m "📡 行业雷达日报 $(date +%Y-%m-%d)"
            git push
          )
