name: Multi-Agent Daily News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # 北京时间 12:00

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: multi-agent-daily
  cancel-in-progress: true

jobs:
  multi-agent-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate API Key
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::error::DEEPSEEK_API_KEY is not configured in repository secrets"
            exit 1
          fi
          echo "API key configured, proceeding with daily news generation"

      - name: Run Multi-Agent Daily News
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/multi-agent-daily.js

      - name: Commit and push all outputs
        run: |
          git config user.name "YUTATA Multi-Agent Bot"
          git config user.email "multi-agent-bot@yutata.dev"
          git add docs/daily/ docs/logs/ docs/weekly/ docs/rules/ scripts/reputation.json scripts/system-stats.json scripts/system-memory.json
          git diff --cached --quiet || (
            git commit -m "📡 多Agent日报 $(date +%Y-%m-%d)"
            git push origin HEAD:main
          )